<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐝 BeeNight — Viral Videos</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

  <!-- Firebase SDKs (Firestore only) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Firebase (Firestore untuk database)
    const firebaseConfig = {
      apiKey: "AIzaSyBY6wORmHEJFJ-JAe070_ANu_IgSl3bU4U",
      authDomain: "beenight-bb9cb.firebaseapp.com",
      projectId: "beenight-bb9cb",
      storageBucket: "beenight-bb9cb.firebasestorage.app",
      messagingSenderId: "39193314373",
      appId: "1:39193314373:web:c81a912d6481e82c844f2c",
      measurementId: "G-97LK9YF7T4"
    };

    // Cloudinary (storage video gratis 25GB)
    const CLOUDINARY_CLOUD = "dtbkqo2co";
    const CLOUDINARY_PRESET = "ml_default";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ============================================================
    // ADMIN PASSWORD — ganti sesuai keinginan
    // ============================================================
    const ADMIN_PASS = "beenight2024";
    const ADMIN_KEY = "beenight_admin_session";

    let isAdmin = localStorage.getItem(ADMIN_KEY) === "true";
    let videoGrid = null;
    let uploadArea = null;
    let progressBar = null;
    let progressWrap = null;

    function formatSize(bytes) {
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    function formatDate(ts) {
      if (!ts) return "";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString("id-ID", { day:"numeric", month:"short", year:"numeric" });
    }

    function renderCard(id, data) {
      const existing = document.getElementById("card-" + id);
      if (existing) return;

      const card = document.createElement("div");
      card.className = "video-card";
      card.id = "card-" + id;

      const thumbSrc = data.thumbnail || "";
      card.innerHTML = `
        <div class="card-thumb" onclick="playVideo('${data.url}', this)">
          ${thumbSrc
            ? `<img src="${thumbSrc}" alt="thumb" />`
            : `<div class="thumb-placeholder"><span>▶</span></div>`}
          <div class="play-overlay"><span>▶</span></div>
        </div>
        <div class="card-info">
          <div class="card-title">${data.title}</div>
          <div class="card-meta">${formatSize(data.size || 0)} · ${formatDate(data.uploadedAt)}</div>
        </div>
        <a class="download-btn" href="${data.downloadLink || '#'}" target="_blank" rel="noopener">⬇ Download Video</a>
        ${isAdmin ? `<button class="delete-btn" data-id="${id}" data-path="${data.storagePath || ''}">🗑 Hapus Video</button>` : ""}
      `;

      videoGrid.appendChild(card);

      if (isAdmin) {
        card.querySelector(".delete-btn").addEventListener("click", async (e) => {
          if (!confirm("Hapus video ini?")) return;
          const btn = e.currentTarget;
          btn.textContent = "Menghapus...";
          btn.disabled = true;
          try {
            // Delete from Cloudinary via API not possible from frontend (no secret key)
            // Just remove from Firestore
            await deleteDoc(doc(db, "videos", btn.dataset.id));
          } catch (err) {
            console.error(err);
            alert("Gagal hapus: " + err.message);
            btn.textContent = "🗑 Hapus";
            btn.disabled = false;
          }
        });
      }
    }

    function removeCard(id) {
      const el = document.getElementById("card-" + id);
      if (el) el.remove();
    }

    function listenVideos() {
      const q = query(collection(db, "videos"), orderBy("uploadedAt", "desc"));
      onSnapshot(q, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
          if (change.type === "added") renderCard(change.doc.id, change.doc.data());
          if (change.type === "removed") removeCard(change.doc.id);
        });

        const empty = document.getElementById("empty-state");
        if (snapshot.empty) {
          if (empty) empty.style.display = "flex";
        } else {
          if (empty) empty.style.display = "none";
        }
      });
    }

    async function generateThumbnail(file) {
      return new Promise((resolve) => {
        const video = document.createElement("video");
        video.preload = "metadata";
        video.src = URL.createObjectURL(file);
        video.onloadeddata = () => {
          video.currentTime = 1;
        };
        video.onseeked = () => {
          const canvas = document.createElement("canvas");
          canvas.width = 320;
          canvas.height = 180;
          canvas.getContext("2d").drawImage(video, 0, 0, 320, 180);
          URL.revokeObjectURL(video.src);
          resolve(canvas.toDataURL("image/jpeg", 0.7));
        };
        video.onerror = () => resolve("");
      });
    }

    async function uploadVideo(file) {
      if (!file || !file.type.startsWith("video/")) {
        alert("Hanya file video yang diperbolehkan!");
        return;
      }

      const titleInput = document.getElementById("upload-title");
      const title = titleInput.value.trim() || file.name.replace(/\.[^/.]+$/, "");

      progressWrap.style.display = "block";
      progressBar.style.width = "5%";
      document.getElementById("progress-text").textContent = "Membuat thumbnail...";

      const thumbnail = await generateThumbnail(file);

      document.getElementById("progress-text").textContent = "Mengupload ke Cloudinary...";
      progressBar.style.width = "10%";

      try {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", CLOUDINARY_PRESET);
        formData.append("resource_type", "video");

        const xhr = new XMLHttpRequest();
        xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/video/upload`);

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 85) + 10;
            progressBar.style.width = pct + "%";
            document.getElementById("progress-text").textContent = `Mengupload... ${pct}%`;
          }
        };

        xhr.onload = async () => {
          if (xhr.status === 200) {
            const res = JSON.parse(xhr.responseText);
            progressBar.style.width = "95%";
            document.getElementById("progress-text").textContent = "Menyimpan ke database...";

            const dlInput = document.getElementById("upload-download-link");
            const downloadLink = dlInput ? dlInput.value.trim() : "";
            await addDoc(collection(db, "videos"), {
              title,
              url: res.secure_url,
              thumbnail: thumbnail || res.secure_url.replace("/upload/", "/upload/so_1,w_320,h_180/").replace(".mp4", ".jpg"),
              publicId: res.public_id,
              downloadLink: downloadLink || "",
              size: file.size,
              uploadedAt: serverTimestamp()
            });

            progressBar.style.width = "100%";
            setTimeout(() => {
              progressWrap.style.display = "none";
              progressBar.style.width = "0%";
              titleInput.value = "";
              document.getElementById("progress-text").textContent = "";
              document.getElementById("upload-modal").style.display = "none";
              document.getElementById("file-input").value = "";
              document.getElementById("file-chosen").textContent = "Belum ada file dipilih";
              const dlEl = document.getElementById("upload-download-link");
              if (dlEl) dlEl.value = "";
            }, 500);
          } else {
            throw new Error("Upload gagal: " + xhr.responseText);
          }
        };

        xhr.onerror = () => {
          alert("Koneksi gagal, coba lagi.");
          progressWrap.style.display = "none";
        };

        xhr.send(formData);
      } catch (err) {
        console.error(err);
        alert("Upload gagal: " + err.message);
        progressWrap.style.display = "none";
      }
    }

    window.playVideo = function(url, thumbEl) {
      const modal = document.getElementById("player-modal");
      const vid = document.getElementById("main-player");
      vid.src = url;
      modal.style.display = "flex";
      vid.play();
    };

    window.closePlayer = function() {
      const vid = document.getElementById("main-player");
      vid.pause();
      vid.src = "";
      document.getElementById("player-modal").style.display = "none";
    };

    window.closeUpload = function() {
      document.getElementById("upload-modal").style.display = "none";
    };

    document.addEventListener("DOMContentLoaded", () => {
      videoGrid = document.getElementById("video-grid");
      uploadArea = document.getElementById("upload-area");
      progressWrap = document.getElementById("progress-wrap");
      progressBar = document.getElementById("progress-bar");

      // Restore admin session on page load
      if (isAdmin) {
        document.querySelectorAll(".admin-badge").forEach(el => el.style.display = "inline-block");
      }

      listenVideos();

      // Upload modal
      document.getElementById("open-upload-btn").addEventListener("click", () => {
        if (!isAdmin) {
          const pass = prompt("Masukkan password admin:");
          if (pass !== ADMIN_PASS) { alert("Password salah!"); return; }
          isAdmin = true;
          localStorage.setItem(ADMIN_KEY, "true");
          document.querySelectorAll(".admin-badge").forEach(el => el.style.display = "inline-block");
        }
        document.getElementById("upload-modal").style.display = "flex";
      });

      // Admin login via header click
      document.getElementById("admin-login-btn").addEventListener("click", () => {
        if (isAdmin) {
          isAdmin = false;
          localStorage.removeItem(ADMIN_KEY);
          document.querySelectorAll(".admin-badge").forEach(el => el.style.display = "none");
          document.querySelectorAll(".delete-btn").forEach(el => el.remove());
          alert("Keluar dari mode admin.");
          return;
        }
        const pass = prompt("Masukkan password admin:");
        if (pass !== ADMIN_PASS) { alert("Password salah!"); return; }
        isAdmin = true;
        localStorage.setItem(ADMIN_KEY, "true");
        document.querySelectorAll(".admin-badge").forEach(el => el.style.display = "inline-block");
        alert("Mode admin aktif! Refresh halaman untuk melihat tombol hapus.");
      });

      // File pick
      document.getElementById("pick-file-btn").addEventListener("click", () => {
        document.getElementById("file-input").click();
      });

      document.getElementById("file-input").addEventListener("change", (e) => {
        const f = e.target.files[0];
        if (f) document.getElementById("file-chosen").textContent = f.name;
      });

      // Drag & drop
      uploadArea.addEventListener("dragover", (e) => { e.preventDefault(); uploadArea.classList.add("drag-over"); });
      uploadArea.addEventListener("dragleave", () => uploadArea.classList.remove("drag-over"));
      uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadArea.classList.remove("drag-over");
        const f = e.dataTransfer.files[0];
        if (f) {
          document.getElementById("file-chosen").textContent = f.name;
          const dt = new DataTransfer();
          dt.items.add(f);
          document.getElementById("file-input").files = dt.files;
        }
      });

      // Submit upload
      document.getElementById("submit-upload-btn").addEventListener("click", () => {
        const file = document.getElementById("file-input").files[0];
        if (!file) { alert("Pilih file video dulu!"); return; }
        uploadVideo(file);
      });

      // Close modals on backdrop click
      document.getElementById("player-modal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) window.closePlayer();
      });
      document.getElementById("upload-modal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) window.closeUpload();
      });
    });
  </script>

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a26;
      --border: #2a2a40;
      --accent: #f5c518;
      --accent2: #ff6b35;
      --text: #f0f0f8;
      --muted: #6b6b8a;
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Space Mono", monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background hex pattern */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 20% 20%, rgba(245,197,24,0.04) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255,107,53,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== HEADER ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-family: "Syne", sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.5px;
    }

    .logo span.bee { font-size: 1.6rem; }
    .logo span.name { color: var(--accent); }
    .logo span.dash { color: var(--muted); font-weight: 400; }

    .admin-badge {
      display: none;
      background: var(--accent2);
      color: #fff;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 8px;
      font-family: "Space Mono", monospace;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0f;
    }
    .btn-primary:hover { background: #ffd740; transform: translateY(-1px); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 64px 24px 40px;
    }

    .hero h1 {
      font-family: "Syne", sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1.1;
      letter-spacing: -1px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--accent);
      position: relative;
    }

    .hero p {
      color: var(--muted);
      margin-top: 12px;
      font-size: 0.92rem;
      line-height: 1.7;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,107,53,0.12);
      border: 1px solid rgba(255,107,53,0.3);
      color: var(--accent2);
      font-size: 0.72rem;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .live-dot {
      width: 6px; height: 6px;
      background: var(--accent2);
      border-radius: 50%;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* ===== GRID ===== */
    .section {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    #video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* ===== CARD ===== */
    .video-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      animation: fadeIn 0.4s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .video-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(245,197,24,0.12);
    }

    .card-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #0e0e18;
      cursor: pointer;
      overflow: hidden;
    }

    .card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      color: var(--muted);
      background: linear-gradient(135deg, #12121a, #1a1a26);
    }

    .play-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.45);
      opacity: 0;
      transition: opacity 0.2s;
      font-size: 2.5rem;
    }

    .card-thumb:hover .play-overlay { opacity: 1; }

    .card-info { padding: 14px 16px; }

    .card-title {
      font-family: "Syne", sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      color: var(--muted);
      font-size: 0.72rem;
      margin-top: 4px;
    }

    .download-btn {
      display: block;
      margin: 0 14px 14px;
      padding: 11px 16px;
      background: linear-gradient(135deg, rgba(245,197,24,0.12), rgba(255,107,53,0.08));
      border: 1px solid rgba(245,197,24,0.3);
      border-radius: 8px;
      color: var(--accent);
      font-family: "Space Mono", monospace;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .download-btn:hover {
      background: linear-gradient(135deg, rgba(245,197,24,0.25), rgba(255,107,53,0.16));
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(245,197,24,0.2);
    }

    .delete-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: rgba(255,60,60,0.08);
      border: none;
      border-top: 1px solid rgba(255,60,60,0.2);
      color: #ff6060;
      font-family: "Space Mono", monospace;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .delete-btn:hover { background: rgba(255,60,60,0.18); }

    /* ===== EMPTY STATE ===== */
    #empty-state {
      grid-column: 1/-1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: var(--muted);
      gap: 12px;
    }
    #empty-state .bee-big { font-size: 4rem; }
    #empty-state p { font-size: 0.88rem; }

    /* ===== MODALS ===== */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Player */
    #player-modal video {
      max-width: 900px;
      width: 100%;
      max-height: 85vh;
      border-radius: 12px;
      background: #000;
      outline: none;
    }

    .modal-close {
      position: absolute;
      top: 20px; right: 24px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.2); }

    /* Upload */
    .upload-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px;
      width: 100%;
      max-width: 500px;
      position: relative;
    }

    .upload-box h2 {
      font-family: "Syne", sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 24px;
    }

    #upload-area {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
    }
    #upload-area.drag-over {
      border-color: var(--accent);
      background: rgba(245,197,24,0.05);
    }
    #upload-area .drop-icon { font-size: 2.5rem; margin-bottom: 10px; }
    #upload-area p { color: var(--muted); font-size: 0.82rem; line-height: 1.6; }

    #file-chosen {
      display: block;
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--accent);
    }

    .upload-field {
      margin-bottom: 16px;
    }
    .upload-field label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .upload-field input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: "Space Mono", monospace;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .upload-field input:focus { border-color: var(--accent); }

    #progress-wrap {
      display: none;
      margin-bottom: 16px;
    }
    .progress-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.3s;
    }
    #progress-text {
      font-size: 0.74rem;
      color: var(--muted);
      margin-top: 6px;
    }

    .upload-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ===== SETUP NOTICE ===== */
    #setup-notice {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 0.78rem;
      color: var(--accent);
      z-index: 300;
      max-width: 420px;
      text-align: center;
      line-height: 1.5;
    }
    #setup-notice strong { display: block; margin-bottom: 4px; font-size: 0.85rem; }
    #setup-notice button {
      margin-top: 8px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.72rem;
      cursor: pointer;
      text-decoration: underline;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .hero { padding: 40px 16px 28px; }
      .section { padding: 0 16px 60px; }
      .upload-box { padding: 24px 18px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <span class="bee">🐝</span>
      <span class="name">BeeNight</span>
      <span class="dash">—</span>
      <span style="color:var(--muted); font-weight:400; font-size:0.95rem;">Viral Videos</span>
      <span class="admin-badge">ADMIN</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" id="open-upload-btn">＋ Upload Video</button>
      <button class="btn btn-ghost" id="admin-login-btn" title="Admin">🔑</button>
    </div>
  </header>

  <!-- HERO -->
  <div class="hero">
    <div class="live-badge"><span class="live-dot"></span> Real-time Sync</div>
    <h1>Koleksi Video<br><em>Viral</em> Terbaik 🔥</h1>
    <p>Upload sekali — langsung tampil di semua perangkat, real-time.</p>
  </div>

  <!-- VIDEO GRID -->
  <div class="section">
    <div id="video-grid">
      <div id="empty-state">
        <div class="bee-big">🐝</div>
        <p>Belum ada video. Upload yang pertama!</p>
      </div>
    </div>
  </div>

  <!-- PLAYER MODAL -->
  <div class="modal-backdrop" id="player-modal">
    <button class="modal-close" onclick="closePlayer()">✕</button>
    <video id="main-player" controls playsinline></video>
  </div>

  <!-- UPLOAD MODAL -->
  <div class="modal-backdrop" id="upload-modal">
    <div class="upload-box">
      <h2>🐝 Upload Video Baru</h2>

      <div id="upload-area">
        <div class="drop-icon">🎬</div>
        <p>Drag & drop video di sini<br>atau klik tombol di bawah</p>
        <button class="btn btn-ghost" id="pick-file-btn" style="margin-top:12px;">Pilih File</button>
        <span id="file-chosen">Belum ada file dipilih</span>
        <input type="file" id="file-input" accept="video/*" style="display:none"/>
      </div>

      <div class="upload-field">
        <label>Judul Video (opsional)</label>
        <input type="text" id="upload-title" placeholder="Judul akan diambil dari nama file jika kosong"/>
      </div>

      <div class="upload-field">
        <label>Link Download (opsional)</label>
        <input type="text" id="upload-download-link" placeholder="https://... (kosongkan jika belum ada)"/>
      </div>

      <div id="progress-wrap">
        <div class="progress-track"><div id="progress-bar"></div></div>
        <div id="progress-text"></div>
      </div>

      <div class="upload-actions">
        <button class="btn btn-ghost" onclick="closeUpload()">Batal</button>
        <button class="btn btn-primary" id="submit-upload-btn">🚀 Upload Sekarang</button>
      </div>
    </div>
  </div>



</body>
</html>
